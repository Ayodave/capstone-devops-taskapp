name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build backend image
      run: docker build -t ayodavee/taskapp-backend:v1.0.0 ./taskapp_backend/
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Push backend image
      run: docker push ayodavee/taskapp-backend:v1.0.0
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build frontend image
      run: docker build -t ayodavee/taskapp-frontend:v1.0.0 ./taskapp_frontend/
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Push frontend image
      run: docker push ayodavee/taskapp-frontend:v1.0.0
  validate-k8s:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.28.8
    - name: Lint K8s manifests
      run: |
        kubectl apply --dry-run=client --validate=false -f k8s/base/namespace.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/base/postgres.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/base/backend.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/base/frontend.yaml
        echo "All manifests validated successfully"
